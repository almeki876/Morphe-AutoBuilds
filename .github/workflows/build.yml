name: Build and Release APKs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 同時に複数回このワークフローが走ると、download-tools ジョブが同じ
# キャッシュキーを取り合って "Unable to reserve cache" 警告が出る
# （実害は小さいが、無駄な再ダウンロードや紛らわしいログの原因になる）。
# 新しい実行が来たら前の実行をキャンセルして直列化する。
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      morphe_tag:
        description: 'Morphe (Official) tag'
        required: false
        default: 'latest'
      anddea_tag:
        description: 'Anddea tag'
        required: false
        default: 'latest'
      piko_tag:
        description: 'Piko tag'
        required: false
        default: 'latest'
      hoo_tag:
        description: 'Hoo-dles tag'
        required: false
        default: 'latest'
      rookie_tag:
        description: 'RookieEnough tag'
        required: false
        default: 'latest'
      tosox_tag:
        description: 'Tosox tag'
        required: false
        default: 'latest'
      yuzu_tag:
        description: 'YuzuMikan404 tag'
        required: false
        default: 'latest'
      dropped_tag:
        description: 'Dropped-Patches tag'
        required: false
        default: 'latest'
      morphe_updated:
        description: 'Whether Morphe (Official) was updated'
        required: false
        default: 'false'
      anddea_updated:
        description: 'Whether Anddea was updated'
        required: false
        default: 'false'
      piko_updated:
        description: 'Whether Piko was updated'
        required: false
        default: 'false'
      hoo_updated:
        description: 'Whether Hoo-dles was updated'
        required: false
        default: 'false'
      rookie_updated:
        description: 'Whether RookieEnough was updated'
        required: false
        default: 'false'
      tosox_updated:
        description: 'Whether Tosox was updated'
        required: false
        default: 'false'
      yuzu_updated:
        description: 'Whether YuzuMikan404 was updated'
        required: false
        default: 'false'
      dropped_updated:
        description: 'Whether Dropped-Patches was updated'
        required: false
        default: 'false'
      morphe_force_build:
        description: 'Force build Morphe due to APK update (no NEW badge)'
        required: false
        default: 'false'
      anddea_force_build:
        description: 'Force build Anddea due to APK update (no NEW badge)'
        required: false
        default: 'false'
      piko_force_build:
        description: 'Force build Piko due to APK update (no NEW badge)'
        required: false
        default: 'false'
      hoo_force_build:
        description: 'Force build Hoo-dles due to APK update (no NEW badge)'
        required: false
        default: 'false'
      rookie_force_build:
        description: 'Force build RookieEnough due to APK update (no NEW badge)'
        required: false
        default: 'false'
      tosox_force_build:
        description: 'Force build Tosox due to APK update (no NEW badge)'
        required: false
        default: 'false'
      yuzu_force_build:
        description: 'Force build YuzuMikan404 due to APK update (no NEW badge)'
        required: false
        default: 'false'
      dropped_force_build:
        description: 'Force build Dropped-Patches due to APK update (no NEW badge)'
        required: false
        default: 'false'

jobs:
  download-tools:
    name: Download Build Tools
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.resolve-tags.outputs.cache-key }}
      morphe_resolved:  ${{ steps.resolve-tags.outputs.morphe_resolved }}
      anddea_resolved:  ${{ steps.resolve-tags.outputs.anddea_resolved }}
      piko_resolved:    ${{ steps.resolve-tags.outputs.piko_resolved }}
      hoo_resolved:     ${{ steps.resolve-tags.outputs.hoo_resolved }}
      rookie_resolved:  ${{ steps.resolve-tags.outputs.rookie_resolved }}
      tosox_resolved:   ${{ steps.resolve-tags.outputs.tosox_resolved }}
      yuzu_resolved:    ${{ steps.resolve-tags.outputs.yuzu_resolved }}
      dropped_resolved: ${{ steps.resolve-tags.outputs.dropped_resolved }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 1. 各ソースの実際のパッチバージョンを確定させる
      #    "latest" が渡された場合はプレリリースを含む最新1件を解決する。
      #    解決済みのタグをキャッシュキーに組み込むことで、
      #    パッチが更新されるたびに必ずキャッシュミスが発生し
      #    古いパッチが再利用されることを防ぐ。
      # ---------------------------------------------------------------
      - name: Resolve Patch Tags and Compute Cache Key
        id: resolve-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # プレリリースを含む全リリースから最新1件のタグを返す
          resolve_tag() {
            local repo="$1" hint="$2"
            if [ -n "$hint" ] && [ "$hint" != "latest" ]; then
              echo "$hint"
              return
            fi
            gh api "repos/${repo}/releases?per_page=100" \
              --jq 'sort_by(.published_at) | reverse | .[0].tag_name' \
              2>/dev/null || echo "unknown"
          }

          morphe_resolved=$(resolve_tag  "MorpheApp/morphe-patches"          "${{ github.event.inputs.morphe_tag }}")
          anddea_resolved=$(resolve_tag  "anddea/revanced-patches"            "${{ github.event.inputs.anddea_tag }}")
          piko_resolved=$(resolve_tag    "crimera/piko"                       "${{ github.event.inputs.piko_tag }}")
          hoo_resolved=$(resolve_tag     "hoo-dles/morphe-patches"            "${{ github.event.inputs.hoo_tag }}")
          rookie_resolved=$(resolve_tag  "RookieEnough/De-ReVanced"           "${{ github.event.inputs.rookie_tag }}")
          tosox_resolved=$(resolve_tag   "Tosox/revanced-patches"             "${{ github.event.inputs.tosox_tag }}")
          yuzu_resolved="patche"  # 固定リリースタグ (matchadaisuke/morphe-patches)
          dropped_resolved=$(resolve_tag "indrastorms/Dropped-Patches"        "${{ github.event.inputs.dropped_tag }}")

          echo "morphe_resolved=$morphe_resolved"   >> $GITHUB_OUTPUT
          echo "anddea_resolved=$anddea_resolved"   >> $GITHUB_OUTPUT
          echo "piko_resolved=$piko_resolved"       >> $GITHUB_OUTPUT
          echo "hoo_resolved=$hoo_resolved"         >> $GITHUB_OUTPUT
          echo "rookie_resolved=$rookie_resolved"   >> $GITHUB_OUTPUT
          echo "tosox_resolved=$tosox_resolved"     >> $GITHUB_OUTPUT
          echo "yuzu_resolved=$yuzu_resolved"       >> $GITHUB_OUTPUT
          echo "dropped_resolved=$dropped_resolved" >> $GITHUB_OUTPUT

          # キャッシュキー = ファイルハッシュ + 全パッチバージョンの結合
          # パッチが1つでも変わればキャッシュミスになる
          version_string="${morphe_resolved}__${anddea_resolved}__${piko_resolved}__${hoo_resolved}__${rookie_resolved}__${tosox_resolved}__${yuzu_resolved}__${dropped_resolved}"
          file_hash="${{ hashFiles('my-patch-config.json', 'arch-config.json', 'sources/**') }}"
          cache_key="build-tools-${file_hash}-${version_string}"
          echo "cache-key=${cache_key}" >> $GITHUB_OUTPUT

          echo "Resolved tags:"
          echo "  morphe:  $morphe_resolved"
          echo "  anddea:  $anddea_resolved"
          echo "  piko:    $piko_resolved"
          echo "  hoo:     $hoo_resolved"
          echo "  rookie:  $rookie_resolved"
          echo "  tosox:   $tosox_resolved"
          echo "  yuzu:    $yuzu_resolved"
          echo "  dropped: $dropped_resolved"
          echo "Cache key: ${cache_key}"

      # ---------------------------------------------------------------
      # 2. キャッシュを先に確認する（ヒットすればダウンロードをスキップ）
      # ---------------------------------------------------------------
      - name: Restore Cached Tools
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: tools/
          key: ${{ steps.resolve-tags.outputs.cache-key }}

      # ---------------------------------------------------------------
      # 3. キャッシュミス時のみダウンロードする
      #    解決済みタグを SOURCE_TAG_* として渡すことで
      #    download_all_tools.py が正しいバージョンを取得する
      # ---------------------------------------------------------------
      - name: Setup Python
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Download All Source Tools
        if: steps.cache-restore.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPD_MORPHE:   ${{ github.event.inputs.morphe_updated }}
          UPD_ANDDEA:   ${{ github.event.inputs.anddea_updated }}
          UPD_PIKO:     ${{ github.event.inputs.piko_updated }}
          UPD_HOO:      ${{ github.event.inputs.hoo_updated }}
          UPD_ROOKIE:   ${{ github.event.inputs.rookie_updated }}
          UPD_TOSOX:    ${{ github.event.inputs.tosox_updated }}
          UPD_YUZU:     ${{ github.event.inputs.yuzu_updated }}
          UPD_DROPPED:  ${{ github.event.inputs.dropped_updated }}
          # 解決済みの具体的なタグを渡す（"latest" は渡さない）
          SOURCE_TAG_MORPHE:          ${{ steps.resolve-tags.outputs.morphe_resolved }}
          SOURCE_TAG_ANDDEA:          ${{ steps.resolve-tags.outputs.anddea_resolved }}
          SOURCE_TAG_REVANCED_ANDDEA: ${{ steps.resolve-tags.outputs.anddea_resolved }}
          SOURCE_TAG_PIKO:            ${{ steps.resolve-tags.outputs.piko_resolved }}
          SOURCE_TAG_HOO:             ${{ steps.resolve-tags.outputs.hoo_resolved }}
          SOURCE_TAG_ROOKIE:          ${{ steps.resolve-tags.outputs.rookie_resolved }}
          SOURCE_TAG_TOSOX:           ${{ steps.resolve-tags.outputs.tosox_resolved }}
          SOURCE_TAG_YUZU:            ${{ steps.resolve-tags.outputs.yuzu_resolved }}
          PAT:                        ${{ secrets.PAT }}
          SOURCE_TAG_DROPPED:         ${{ steps.resolve-tags.outputs.dropped_resolved }}
        run: |
          pip install -r requirements.txt -q
          python3 scripts/download_all_tools.py

      # ---------------------------------------------------------------
      # 4. ダウンロード済みの tools/ をキャッシュに保存する
      #    キャッシュミス時のみ保存が走る（actions/cache の仕様）
      # ---------------------------------------------------------------
      - name: Save Cached Tools
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tools/
          key: ${{ steps.resolve-tags.outputs.cache-key }}

  prepare-matrix:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    # download-tools の後に実行することで、同一リポジトリへの並列 checkout を防ぐ。
    # 並列 checkout は GitHub の secondary rate limit を引き起こし
    # "Your account is suspended" エラーの原因になる。
    needs: [download-tools]
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Patch Config and Filter by Updated Sources
        id: read-matrix
        env:
          UPD_MORPHE:   ${{ github.event.inputs.morphe_updated }}
          UPD_ANDDEA:   ${{ github.event.inputs.anddea_updated }}
          UPD_PIKO:     ${{ github.event.inputs.piko_updated }}
          UPD_HOO:      ${{ github.event.inputs.hoo_updated }}
          UPD_ROOKIE:   ${{ github.event.inputs.rookie_updated }}
          UPD_TOSOX:    ${{ github.event.inputs.tosox_updated }}
          UPD_YUZU:     ${{ github.event.inputs.yuzu_updated }}
          UPD_DROPPED:  ${{ github.event.inputs.dropped_updated }}
          FORCE_MORPHE:  ${{ github.event.inputs.morphe_force_build }}
          FORCE_ANDDEA:  ${{ github.event.inputs.anddea_force_build }}
          FORCE_PIKO:    ${{ github.event.inputs.piko_force_build }}
          FORCE_HOO:     ${{ github.event.inputs.hoo_force_build }}
          FORCE_ROOKIE:  ${{ github.event.inputs.rookie_force_build }}
          FORCE_TOSOX:   ${{ github.event.inputs.tosox_force_build }}
          FORCE_YUZU:    ${{ github.event.inputs.yuzu_force_build }}
          FORCE_DROPPED: ${{ github.event.inputs.dropped_force_build }}
        run: |
          # env: + run: is valid; env: + uses: is not (Actions parser error).
          python3 scripts/prepare_matrix.py

  build-apps:
    name: Build ${{ matrix.app_name }} with ${{ matrix.source }}
    needs: [download-tools, prepare-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cached Tools
        uses: actions/cache/restore@v4
        with:
          path: tools/
          key: ${{ needs.download-tools.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build APK
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.app_name }} with ${{ matrix.source }}..."
          sleep $((RANDOM % 10))
          python3 -m src

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"

  create-release:
    name: Create Integrated Release
    needs: [download-tools, prepare-matrix, build-apps]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Download All APK Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-apks


      - name: Collect All APKs
        run: |
          mkdir -p ./release-apks
          echo "Collecting built APKs..."
          [ -d ./all-apks ] && find ./all-apks -name "*.apk" -exec cp {} ./release-apks/ \; || true
          echo "APKs in release-apks:"
          ls -la ./release-apks/ 2>/dev/null || echo "(none)"

      - name: Check if Any APKs Were Built
        id: check-apks
        run: |
          total=$(find ./release-apks -name "*.apk" 2>/dev/null | wc -l)
          echo "Total APKs built: $total"
          if [ "$total" -eq 0 ]; then
            echo "No APKs available -- skipping release"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          else
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Tag (JST)
        if: steps.check-apks.outputs.skip_release == 'false'
        id: tag
        run: |
          jst_time=$(TZ=Asia/Tokyo date +'%Y-%m-%d_%H-%M-JST')
          echo "release_tag=$jst_time" >> $GITHUB_OUTPUT
          echo "Release tag: $jst_time"

      - name: Generate Release Notes
        if: steps.check-apks.outputs.skip_release == 'false'
        id: notes
        run: |
          # download-tools で解決済みのタグをそのまま使う（再解決しない）
          morphe_tag="${{ needs.download-tools.outputs.morphe_resolved }}"
          anddea_tag="${{ needs.download-tools.outputs.anddea_resolved }}"
          piko_tag="${{ needs.download-tools.outputs.piko_resolved }}"
          hoo_tag="${{ needs.download-tools.outputs.hoo_resolved }}"
          rookie_tag="${{ needs.download-tools.outputs.rookie_resolved }}"
          tosox_tag="${{ needs.download-tools.outputs.tosox_resolved }}"
          yuzu_tag="${{ needs.download-tools.outputs.yuzu_resolved }}"
          dropped_tag="${{ needs.download-tools.outputs.dropped_resolved }}"

          morphe_updated="${{ github.event.inputs.morphe_updated }}"
          anddea_updated="${{ github.event.inputs.anddea_updated }}"
          piko_updated="${{ github.event.inputs.piko_updated }}"
          hoo_updated="${{ github.event.inputs.hoo_updated }}"
          rookie_updated="${{ github.event.inputs.rookie_updated }}"
          tosox_updated="${{ github.event.inputs.tosox_updated }}"
          yuzu_updated="${{ github.event.inputs.yuzu_updated }}"
          dropped_updated="${{ github.event.inputs.dropped_updated }}"

          jst_time=$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')

          morphe_force="${{ github.event.inputs.morphe_force_build }}"
          anddea_force="${{ github.event.inputs.anddea_force_build }}"
          piko_force="${{ github.event.inputs.piko_force_build }}"
          hoo_force="${{ github.event.inputs.hoo_force_build }}"
          rookie_force="${{ github.event.inputs.rookie_force_build }}"
          tosox_force="${{ github.event.inputs.tosox_force_build }}"
          yuzu_force="${{ github.event.inputs.yuzu_force_build }}"
          dropped_force="${{ github.event.inputs.dropped_force_build }}"

          {
            echo "$jst_time"
            echo ""
            echo "| Source | Version | Apps | Status |"
            echo "| --- | --- | --- | --- |"

            # emit_row label url tag updated force apps
            # アセットにないソース（updated=false かつ force=false）は行を出力しない
            emit_row() {
              local label="$1" url="$2" tag="$3" updated="$4" force="$5" apps="$6"
              # どちらもfalseならスキップ
              if [ "$updated" != "true" ] && [ "$force" != "true" ]; then
                return
              fi
              local status=""
              if [ "$updated" = "true" ] && [ "$force" = "true" ]; then
                status="🔄 Patches & APK"
              elif [ "$updated" = "true" ]; then
                status="🔄 Patches"
              else
                status="🔄 APK"
              fi
              echo "| [$label]($url) | [$tag]($url/releases/tag/$tag) | $apps | $status |"
            }

            emit_row "Morphe"          "https://github.com/MorpheApp/morphe-patches"         "$morphe_tag"  "$morphe_updated"  "$morphe_force"  "YouTube, YouTube Music"
            emit_row "Anddea"          "https://github.com/anddea/revanced-patches"           "$anddea_tag"  "$anddea_updated"  "$anddea_force"  "YouTube, YouTube Music"
            emit_row "Piko"            "https://github.com/crimera/piko"                      "$piko_tag"    "$piko_updated"    "$piko_force"    "Instagram"
            emit_row "Hoo-dles"        "https://github.com/hoo-dles/morphe-patches"           "$hoo_tag"     "$hoo_updated"     "$hoo_force"     "AdGuard, Prime Video, Duolingo, IBS Paint, Icon Packer, Nova, Proton VPN, Smart Launcher, SoundCloud, WPS Office, Crunchyroll"
            emit_row "RookieEnough"    "https://github.com/RookieEnough/De-ReVanced"          "$rookie_tag"  "$rookie_updated"  "$rookie_force"  "Proton Mail, Disney+, Photomath, Pixiv"
            emit_row "Tosox"           "https://github.com/Tosox/revanced-patches"            "$tosox_tag"   "$tosox_updated"   "$tosox_force"   "MEGA"
            emit_row "YuzuMikan404"    "https://github.com/YuzuMikan404/linegms-fork-second-" "$yuzu_tag"    "$yuzu_updated"    "$yuzu_force"    "ゆうちょ通帳, ゆうちょ認証"
            emit_row "Dropped-Patches" "https://github.com/indrastorms/Dropped-Patches"       "$dropped_tag" "$dropped_updated" "$dropped_force" ""
          } > release_notes.md

          echo "Release notes generated"

      - name: Create Release
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${{ steps.tag.outputs.release_tag }}"

          echo "Creating release: $release_tag"

          # Delete existing release/tag with the same name if it exists, then recreate
          gh release delete "$release_tag" --yes 2>/dev/null || true
          git push --delete origin "refs/tags/$release_tag" 2>/dev/null || true

          gh release create "$release_tag" \
            --title "Morphe AutoBuilds $release_tag" \
            --notes-file release_notes.md \
            ./release-apks/*.apk

          echo "Release created successfully!"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$release_tag"

      - name: Display Release Summary
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${{ steps.tag.outputs.release_tag }}"

          echo "Release Summary:"
          echo "  Tag: $release_tag"
          echo "  APKs:"
          ls -1 ./release-apks/*.apk | sed 's/^/    - /'
          echo ""
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/$release_tag"
