name: Trigger Test Build All (Release)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  trigger-build:
    name: Trigger Full Build and Release Workflow
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Latest Tags and Trigger Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          fetch_tag() {
            gh api "repos/${1}/releases?per_page=100" \
              --jq 'sort_by(.published_at) | reverse | .[0].tag_name' \
              2>/dev/null || echo ""
          }

          echo "Fetching latest tags..."
          morphe_tag=$(fetch_tag  "MorpheApp/morphe-patches")
          anddea_tag=$(fetch_tag  "anddea/revanced-patches")
          piko_tag=$(fetch_tag    "crimera/piko")
          hoo_tag=$(fetch_tag     "hoo-dles/morphe-patches")
          rookie_tag=$(fetch_tag  "RookieEnough/De-ReVanced")
          tosox_tag=$(fetch_tag   "Tosox/revanced-patches")
          dropped_tag=$(fetch_tag "indrastorms/Dropped-Patches")

          echo "Tags fetched:"
          echo "  morphe:  $morphe_tag"
          echo "  anddea:  $anddea_tag"
          echo "  piko:    $piko_tag"
          echo "  hoo:     $hoo_tag"
          echo "  rookie:  $rookie_tag"
          echo "  tosox:   $tosox_tag"
          echo "  dropped: $dropped_tag"

          echo "Triggering build.yml with all flags set to true..."

          gh workflow run build.yml \
            -f morphe_tag="$morphe_tag" \
            -f anddea_tag="$anddea_tag" \
            -f piko_tag="$piko_tag" \
            -f hoo_tag="$hoo_tag" \
            -f rookie_tag="$rookie_tag" \
            -f tosox_tag="$tosox_tag" \
            -f dropped_tag="$dropped_tag" \
            -f morphe_updated="true" \
            -f anddea_updated="true" \
            -f piko_updated="true" \
            -f hoo_updated="true" \
            -f rookie_updated="true" \
            -f tosox_updated="true" \
            -f dropped_updated="true" \
            -f morphe_force_build="true" \
            -f anddea_force_build="true" \
            -f piko_force_build="true" \
            -f hoo_force_build="true" \
            -f rookie_force_build="true" \
            -f tosox_force_build="true" \
            -f dropped_force_build="true"

          echo "Build workflow triggered successfully."
